<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yu-Gi-Oh! Booster Draft Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#7a6030;
  --bg:#07070f;--bg2:#0e0e1a;--bg3:#151522;--bg4:#1c1c2e;--bg5:#23233a;
  --text:#ede5d0;--text-d:#7a7060;--text-m:#b8a888;
  --border:rgba(201,168,76,.14);--border-s:rgba(201,168,76,.38);--border-ss:rgba(201,168,76,.65);
  --r:5px;--rl:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px}
body{min-height:100vh;background:
  radial-gradient(ellipse at 50% -5%,rgba(201,168,76,.09) 0%,transparent 50%),
  radial-gradient(ellipse at 0% 100%,rgba(100,50,10,.15) 0%,transparent 40%),
  radial-gradient(ellipse at 100% 100%,rgba(50,10,100,.12) 0%,transparent 40%),
  repeating-linear-gradient(0deg,transparent,transparent 80px,rgba(201,168,76,.018) 80px,rgba(201,168,76,.018) 81px),
  repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(201,168,76,.018) 80px,rgba(201,168,76,.018) 81px),var(--bg)}
h1,h2,h3,h4{font-family:'Cinzel',serif;letter-spacing:.04em}
h1{font-size:1.9rem;color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,.5),0 2px 6px rgba(0,0,0,.9)}
h2{font-size:1.2rem;color:var(--gold-l)}
h3{font-size:1rem;color:var(--text);font-weight:600}
p{line-height:1.6}
#app{max-width:1080px;margin:0 auto;padding:1.2rem 1.2rem 4rem}
.header{display:flex;align-items:center;gap:1rem;padding:1.2rem 1.5rem;margin-bottom:1.4rem;border:1px solid var(--border-s);border-radius:var(--rl);background:linear-gradient(135deg,rgba(201,168,76,.06) 0%,transparent 60%);position:relative;overflow:hidden}
.header::before{content:'𓂀  𓆣  𓊽  𓇯  𓆑  𓊹  𓋴  𓏏  𓀭  𓁼';position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:.6rem;letter-spacing:.35em;color:var(--gold-d);opacity:.55;pointer-events:none}
.logo-glyph{font-size:2.2rem;filter:drop-shadow(0 0 12px rgba(201,168,76,.6))}
.header-sub{font-size:.79rem;color:var(--text-d);margin-top:3px;font-style:italic;letter-spacing:.04em}
.nav{display:flex;gap:5px;margin-bottom:1.4rem;border-bottom:1px solid var(--border);padding-bottom:10px;flex-wrap:wrap}
.nb{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.08em;padding:7px 18px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--text-d);cursor:pointer;transition:all .15s}
.nb:hover{border-color:var(--border-s);color:var(--text)}
.nb.active{border-color:var(--gold-d);background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));color:var(--gold)}
.page{display:none}.page.active{display:block}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem 1.2rem;margin-bottom:1rem;position:relative}
.panel-gold{border-color:var(--border-s);background:linear-gradient(135deg,var(--bg2) 0%,rgba(201,168,76,.05) 100%)}
.panel-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;color:var(--gold-d);text-transform:uppercase;position:absolute;top:-9px;left:16px;background:var(--bg2);padding:0 8px}
.btn{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.06em;cursor:pointer;border-radius:var(--r);padding:8px 18px;border:1px solid var(--border-s);background:transparent;color:var(--gold);transition:all .15s;white-space:nowrap}
.btn:hover{background:rgba(201,168,76,.14);border-color:var(--border-ss)}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#1a1000;border-color:var(--gold);font-weight:700;box-shadow:0 2px 12px rgba(201,168,76,.3)}
.btn-primary:hover{background:linear-gradient(135deg,var(--gold-l),var(--gold));box-shadow:0 4px 20px rgba(201,168,76,.5)}
.btn-danger{border-color:rgba(192,57,43,.5);color:#e74c3c}
.btn-danger:hover{background:rgba(192,57,43,.15)}
.btn-green{border-color:rgba(46,204,113,.3);color:#2ecc71}
.btn-green:hover{background:rgba(46,204,113,.1)}
.btn-sm{padding:5px 12px;font-size:.7rem}.btn-xs{padding:3px 8px;font-size:.65rem}
.btn-lg{padding:12px 28px;font-size:.86rem;letter-spacing:.08em}
input[type=text],input[type=number],select,textarea{background:var(--bg3);border:1px solid rgba(201,168,76,.18);border-radius:var(--r);color:var(--text);padding:7px 11px;font-size:.9rem;font-family:'Crimson Pro',serif;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-d);background:var(--bg4)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:100px;line-height:1.5}
label{font-size:.72rem;color:var(--text-d);letter-spacing:.07em;font-family:'Cinzel',serif;display:block;margin-bottom:5px}
.badge{display:inline-block;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.05em;padding:2px 7px;border-radius:999px;border:1px solid;white-space:nowrap}
.b-C{color:#8a8070;border-color:#3a3530;background:rgba(138,128,112,.1)}
.b-R{color:#6699dd;border-color:rgba(102,153,221,.4);background:rgba(102,153,221,.1)}
.b-SR{color:#ddbb44;border-color:rgba(221,187,68,.5);background:rgba(221,187,68,.12)}
.b-UR{color:#ee8833;border-color:rgba(238,136,51,.5);background:rgba(238,136,51,.12)}
.b-SCR{color:#dd88ff;border-color:rgba(221,136,255,.45);background:rgba(221,136,255,.12)}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.spacer{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:680px){.grid2,.grid3{grid-template-columns:1fr}}
.mt{margin-top:10px}.mt2{margin-top:1.2rem}.mb{margin-bottom:10px}.mb2{margin-bottom:1.2rem}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;color:var(--text-d);border-bottom:1px solid var(--border);padding:7px 8px;text-align:left}
td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,.03)}
.alert{padding:10px 14px;border-radius:var(--r);font-size:.87rem;margin-bottom:10px;border:1px solid}
.alert-info{background:rgba(68,136,221,.08);border-color:rgba(68,136,221,.3);color:#88bbee}
.alert-success{background:rgba(46,204,113,.07);border-color:rgba(46,204,113,.3);color:#55cc88}
.alert-warn{background:rgba(201,168,76,.07);border-color:rgba(201,168,76,.3);color:var(--gold-l)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-family:'Cinzel',serif;font-size:.67rem;letter-spacing:.04em;border:1px solid var(--border);color:var(--text-d);background:var(--bg3)}
.chip.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.chip.ai-chip{border-color:rgba(153,102,238,.4);color:#bb88ee;background:rgba(102,51,187,.1)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.scroll-box{max-height:260px;overflow-y:auto;padding-right:2px}
.scroll-box::-webkit-scrollbar{width:3px}
.scroll-box::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}
.deck-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px}
.deck-tile{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;font-size:.83rem;display:flex;align-items:center;gap:8px}
.slot-row{display:grid;grid-template-columns:1fr 80px 32px;gap:8px;align-items:center;margin-bottom:7px}
.import-example{font-size:.74rem;color:var(--text-d);font-family:monospace;background:var(--bg4);padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);margin-top:6px;line-height:1.8;white-space:pre}
.ornament{text-align:center;color:var(--gold-d);font-size:.8rem;letter-spacing:.4em;margin:14px 0;opacity:.7}

/* === YGO CARD VISUAL === */
.ygo-card{
  border-radius:5px;cursor:pointer;
  transition:transform .18s cubic-bezier(.2,.8,.3,1),box-shadow .18s;
  position:relative;overflow:hidden;
  aspect-ratio:421/614;width:100%;user-select:none;
  background:var(--bg4);
}
.ygo-card:hover{transform:translateY(-6px) scale(1.05);z-index:20;box-shadow:0 12px 32px rgba(0,0,0,.8),0 0 0 1px rgba(201,168,76,.3)}
.ygo-card.selected{
  transform:translateY(-6px) scale(1.05);z-index:20;
  box-shadow:0 0 0 3px var(--gold),0 0 28px rgba(201,168,76,.6),0 12px 32px rgba(0,0,0,.8);
}
.ygo-card img.card-img{
  width:100%;height:100%;object-fit:cover;border-radius:5px;
  display:block;
}
.ygo-card .card-loading{
  position:absolute;inset:0;border-radius:5px;
  background:linear-gradient(160deg,var(--bg4) 0%,var(--bg5) 50%,var(--bg4) 100%);
  background-size:200% 100%;
  animation:skelshimmer 1.4s ease infinite;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
@keyframes skelshimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ygo-card .card-fallback{
  position:absolute;inset:0;border-radius:5px;
  display:flex;flex-direction:column;border:2px solid;overflow:hidden;
}
.ygo-card .card-fallback.hidden{display:none}
.frame-normal .card-fallback{background:linear-gradient(160deg,#c8860a,#8b5e08 40%,#6b4706);border-color:#d49010}
.frame-effect .card-fallback{background:linear-gradient(160deg,#b86820,#7a4010 50%,#4a2208);border-color:#d4840e}
.frame-spell .card-fallback{background:linear-gradient(160deg,#1a7060,#0d4540 50%,#082520);border-color:#2aa090}
.frame-trap .card-fallback{background:linear-gradient(160deg,#7a2060,#4a1040 50%,#2a0820);border-color:#aa3080}
.frame-fusion .card-fallback{background:linear-gradient(160deg,#6644aa,#3a2270 50%,#220d4a);border-color:#8866cc}
.frame-ritual .card-fallback{background:linear-gradient(160deg,#2244aa,#112266 50%,#081133);border-color:#3366dd}
.frame-flip .card-fallback{background:linear-gradient(160deg,#b86820,#7a4010 50%,#4a2208);border-color:#d4840e}
.fallback-name{font-family:'Cinzel',serif;font-size:clamp(7px,1.8vw,10px);font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);padding:4px 5px;line-height:1.25;text-align:center;flex:1;display:flex;align-items:center;justify-content:center}
.fallback-stats{font-family:'Cinzel',serif;font-size:clamp(6px,1.2vw,8px);color:rgba(255,255,255,.85);padding:2px 5px;background:rgba(0,0,0,.5);text-align:right}
.foil-sr{position:absolute;inset:0;background:linear-gradient(135deg,transparent 20%,rgba(255,215,0,.08) 50%,transparent 80%);animation:shimmer 2.5s ease-in-out infinite;pointer-events:none;border-radius:5px}
.foil-ur{position:absolute;inset:0;background:linear-gradient(135deg,transparent 10%,rgba(255,140,0,.13) 45%,rgba(255,215,0,.1) 55%,transparent 90%);animation:shimmer 2s ease-in-out infinite;pointer-events:none;border-radius:5px}
.foil-scr{position:absolute;inset:0;background:linear-gradient(135deg,transparent 10%,rgba(200,100,255,.15) 40%,rgba(255,255,255,.12) 55%,transparent 90%);animation:shimmer 1.8s ease-in-out infinite;pointer-events:none;border-radius:5px}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:1}}
.rarity-badge-overlay{
  position:absolute;bottom:5px;right:5px;
  font-family:'Cinzel',serif;font-size:clamp(6px,1.1vw,9px);
  padding:2px 6px;border-radius:999px;border:1px solid;
  background:rgba(0,0,0,.7);pointer-events:none;
}
.ygo-card img.card-img.loading{opacity:0}
.ygo-card img.card-img.loaded{opacity:1;transition:opacity .25s ease}

.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:12px}
@media(max-width:500px){.pick-grid{grid-template-columns:repeat(3,1fr)}}
.pick-card-wrap{display:flex;flex-direction:column}
.pick-card-wrap .ygo-card{box-shadow:0 4px 16px rgba(0,0,0,.6)}

.card-back{
  border-radius:5px;
  aspect-ratio:421/614;
  width:100%;
  background:
    radial-gradient(ellipse at 50% 40%, #1a2f7a 0%, #0a1545 55%, #050d2a 100%);
  border:2px solid #c8a830;
  position:relative;overflow:hidden;
  box-shadow:inset 0 0 0 3px #0a1545, inset 0 0 0 5px #c8a830;
}
.card-back::before{
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(200,168,48,.35);
  border-radius:3px;pointer-events:none;
}
.card-back-inner{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
}

@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .25s ease forwards}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.thinking{animation:pulse 1.2s infinite;color:var(--text-d);font-style:italic;font-size:.88rem}

.detail-overlay{
  display:none;position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.88);
  align-items:center;justify-content:center;
  padding:1rem;
}
.detail-overlay.open{display:flex}
.detail-inner{
  display:flex;gap:1.5rem;align-items:flex-start;
  max-width:860px;width:100%;
  max-height:92vh;
}
.detail-card-col{
  width:min(480px,58vw);flex-shrink:0;
}
.detail-info-col{
  flex:1;min-width:0;
  background:var(--bg2);border:1px solid var(--border-s);
  border-radius:var(--rl);padding:1.2rem;
  max-height:92vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
}
.detail-info-col::-webkit-scrollbar{width:3px}
.detail-info-col::-webkit-scrollbar-thumb{background:var(--gold-d)}
.detail-close-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.detail-card-name{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:600;color:var(--gold-l);line-height:1.3;flex:1}
.detail-badges{display:flex;flex-wrap:wrap;gap:5px}
.detail-stat-pill{background:var(--bg4);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:.75rem;font-family:'Cinzel',serif;color:var(--text-m);white-space:nowrap}
.detail-text-box{font-size:.95rem;line-height:1.7;color:var(--text);background:var(--bg3);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border)}
@media(max-width:600px){
  .detail-inner{flex-direction:column;align-items:center}
  .detail-card-col{width:min(280px,85vw)}
}

.reveal-wrap{position:relative;cursor:pointer}
.reveal-back{
  position:absolute;inset:0;border-radius:5px;z-index:3;
  transition:opacity .25s ease;
  pointer-events:none;
}
.reveal-wrap.revealed .reveal-back{opacity:0}
.reveal-wrap .ygo-card{opacity:0;transition:opacity .2s .1s ease}
.ygo-card-slot{position:relative}
.reveal-wrap.revealed .ygo-card{opacity:1}
.reveal-hint{
  position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.reveal-hint span{
  background:rgba(0,0,0,.55);border:1px solid rgba(201,168,76,.4);
  border-radius:999px;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.06em;
  color:var(--gold-l);padding:3px 9px;
}
.reveal-wrap.revealed .reveal-hint{display:none}

.db-layout{display:grid;grid-template-columns:1fr 280px;gap:1rem;align-items:start}
@media(max-width:700px){.db-layout{grid-template-columns:1fr}}
.db-pool{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.db-card-slot{position:relative;cursor:pointer;border-radius:5px;transition:transform .12s}
.db-card-slot:hover{transform:translateY(-3px)}
.db-card-slot .in-deck-badge{
  position:absolute;top:4px;left:4px;z-index:5;
  background:rgba(0,0,0,.75);border:1px solid var(--gold);
  border-radius:999px;font-family:'Cinzel',serif;font-size:.65rem;
  color:var(--gold);padding:1px 7px;pointer-events:none;
}
.db-card-slot .add-btn{
  position:absolute;inset:0;border-radius:5px;z-index:4;
  background:rgba(0,0,0,.0);display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:6px;opacity:0;transition:opacity .15s;
}
.db-card-slot:hover .add-btn{opacity:1}
.db-card-slot .add-btn button{
  font-family:'Cinzel',serif;font-size:.68rem;padding:3px 10px;
  border-radius:999px;border:1px solid var(--gold);
  background:rgba(0,0,0,.8);color:var(--gold);cursor:pointer;
}
.db-card-slot.maxed{opacity:.45;pointer-events:none}
.db-sidebar{background:var(--bg2);border:1px solid var(--border-s);border-radius:var(--rl);padding:1rem;position:sticky;top:1rem}
.db-deck-list{max-height:55vh;overflow-y:auto;margin-bottom:10px}
.db-deck-list::-webkit-scrollbar{width:3px}
.db-deck-list::-webkit-scrollbar-thumb{background:var(--gold-d)}
.db-deck-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.db-deck-row:last-child{border-bottom:none}
.db-deck-count{font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);min-width:18px;text-align:center}
.db-section-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;color:var(--text-d);text-transform:uppercase;margin:10px 0 5px;padding-top:8px;border-top:1px solid var(--border)}
.db-counter{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--gold)}
.db-counter.ok{color:#2ecc71}.db-counter.warn{color:#e74c3c}

.player-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);margin-bottom:5px}
.player-row.me{border-color:var(--gold-d);background:rgba(201,168,76,.06)}
.player-row.host-tag::after{content:'HOST';font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;color:var(--gold);background:rgba(201,168,76,.12);border:1px solid var(--gold-d);border-radius:999px;padding:1px 6px;margin-left:4px}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-dot.ok{background:#2ecc71}.conn-dot.off{background:#e74c3c}.conn-dot.wait{background:var(--gold);animation:pulse 1s infinite}

@media(max-width:600px){
  #app{padding:.7rem .7rem 5rem}
  h1{font-size:1.3rem}
  h2{font-size:1rem}
  .nav{gap:3px}
  .nb{padding:6px 10px;font-size:.68rem;letter-spacing:.04em}
  .panel{padding:.8rem .9rem}
  .pick-grid{grid-template-columns:repeat(3,1fr);gap:7px}
  .pick-layout{grid-template-columns:1fr}
  .picked-sidebar{position:static}
  .detail-inner{flex-direction:column;align-items:center;gap:.8rem}
  .detail-card-col{width:min(260px,80vw)}
  .detail-info-col{width:100%;max-height:none}
  .db-layout{grid-template-columns:1fr}
  .db-sidebar{position:static}
  .db-pool{grid-template-columns:repeat(3,1fr);gap:7px}
  .reveal-grid{grid-template-columns:repeat(3,1fr);gap:7px}
  .grid2,.grid3{grid-template-columns:1fr}
  .btn-lg{padding:10px 20px;font-size:.82rem}
  .btn{min-height:38px}
  .btn-sm{min-height:32px}
  .pass-screen h2{font-size:1.2rem}
  #room-code-display{font-size:2.8rem;letter-spacing:.3em}
  #join-code{font-size:1.4rem;letter-spacing:.2em}
  .ygo-card{border-radius:4px}
  .deck-builder-overlay .detail-inner{padding:.5rem}
  .nav{overflow-x:auto;flex-wrap:nowrap;padding-bottom:6px}
  .nav::-webkit-scrollbar{height:2px}
  .nav::-webkit-scrollbar-thumb{background:var(--gold-d)}
}
@media(max-width:380px){
  .pick-grid{grid-template-columns:repeat(2,1fr)}
  .db-pool{grid-template-columns:repeat(2,1fr)}
  .reveal-grid{grid-template-columns:repeat(2,1fr)}
  .nb{padding:5px 8px;font-size:.62rem}
}
@media(hover:none){
  .ygo-card:hover{transform:none}
  .btn:hover{background:transparent}
