<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YGO Draft</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center}
.card{display:inline-block;margin:10px}
img{width:200px}
</style>
</head>
<body>

<h1>Yu‑Gi‑Oh Draft Test</h1>
<div id="cards"></div>

<script>
async function loadPool(){
  const res = await fetch('/cards.json');
  const data = await res.json();
  return data.cards;
}

async function getCardInfo(name){
  const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(name)}`);
  const json = await res.json();
  return json.data[0];
}

async function render(){
  const pool = await loadPool();
  const container = document.getElementById("cards");

  for(const card of pool){
    const info = await getCardInfo(card.name);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${info.name}</h3>
      <img src="${info.card_images[0].image_url}">
      <p>${card.rarity}</p>
    `;

    container.appendChild(div);
  }
}

render();
</script>

</body>
</html>
